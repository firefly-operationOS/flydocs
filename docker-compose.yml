# Copyright 2026 Firefly Software Solutions Inc
#
# Default compose stack:  api + worker + postgres + redis
#
# Usage:
#   cp env_template .env
#   docker compose --profile default up --build
#
# For integration tests with the mock LLM, add the ``test`` profile via
# docker-compose.test.yml:
#   docker compose -f docker-compose.yml -f docker-compose.test.yml \
#                  --profile default --profile test up --build

x-build: &service-build
  context: .
  dockerfile: Dockerfile
  additional_contexts:
    pyfly: ../../fireflyframework/fireflyframework-pyfly
    fireflyframework-agentic: ../../fireflyframework/fireflyframework-agentic

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: idp
      POSTGRES_PASSWORD: idp
      POSTGRES_DB: flydesk_idp
    ports:
      - "${PG_PORT:-5435}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idp -d flydesk_idp"]
      interval: 5s
      timeout: 5s
      retries: 30
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6385}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 30

  # Office-doc conversion sidecar. Owns headless LibreOffice + Chromium
  # internally so the API + worker containers stay distroless-friendly
  # (no ``soffice`` binary, no writable filesystem, no shell). The
  # ``flydesk-idp`` containers POST DOCX/XLSX/PPTX/RTF/HTML bytes here
  # and get back the rendered PDF -- selected by
  # ``FLYDESK_IDP_OFFICE_CONVERTER=gotenberg`` (the default).
  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: flydesk-idp-gotenberg
    ports:
      - "${GOTENBERG_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:3000/health"]
      interval: 5s
      timeout: 3s
      retries: 30
    command:
      - "gotenberg"
      - "--api-timeout=60s"
      - "--libreoffice-restart-after=10"

  api:
    build: *service-build
    image: flydesk-idp:latest
    container_name: flydesk-idp-api
    command: ["serve"]
    ports:
      - "${IDP_PORT:-8400}:8400"
    # Optional .env -- compose v2 honours ``required: false`` so the stack
    # boots even without a local .env (provider keys fall back to the host
    # shell env). ``task docker:up`` also auto-creates .env from env_template.
    env_file:
      - path: .env
        required: false
    environment:
      FLYDESK_IDP_DATABASE_URL: postgresql+asyncpg://idp:idp@postgres:5432/flydesk_idp
      FLYDESK_IDP_REDIS_URL: redis://redis:6379/0
      FLYDESK_IDP_EDA_ADAPTER: postgres
      FLYDESK_IDP_MODEL: ${FLYDESK_IDP_MODEL:-anthropic:claude-sonnet-4-6}
      FLYDESK_IDP_OFFICE_CONVERTER: ${FLYDESK_IDP_OFFICE_CONVERTER:-gotenberg}
      FLYDESK_IDP_GOTENBERG_URL: http://gotenberg:3000
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RUN_MIGRATIONS: "true"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      gotenberg:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8400/actuator/health/readiness"]
      interval: 5s
      timeout: 3s
      retries: 30

  worker:
    build: *service-build
    image: flydesk-idp:latest
    container_name: flydesk-idp-worker
    command: ["worker"]
    env_file:
      - path: .env
        required: false
    environment:
      FLYDESK_IDP_DATABASE_URL: postgresql+asyncpg://idp:idp@postgres:5432/flydesk_idp
      FLYDESK_IDP_REDIS_URL: redis://redis:6379/0
      FLYDESK_IDP_EDA_ADAPTER: postgres
      FLYDESK_IDP_MODEL: ${FLYDESK_IDP_MODEL:-anthropic:claude-sonnet-4-6}
      FLYDESK_IDP_OFFICE_CONVERTER: ${FLYDESK_IDP_OFFICE_CONVERTER:-gotenberg}
      FLYDESK_IDP_GOTENBERG_URL: http://gotenberg:3000
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RUN_MIGRATIONS: "false"
    depends_on:
      api:
        condition: service_healthy
      gotenberg:
        condition: service_healthy

  # Second-stage EDA consumer: subscribes to ``flydesk.idp.bbox.refine``
  # events that ``worker`` publishes when an extraction finishes with
  # ``options.stages.bbox_refine == true``. Grounds bboxes against the
  # PDF text layer / configured OCR engine, persists the refined result,
  # transitions the job ``PARTIAL_SUCCEEDED -> SUCCEEDED``, and fires the
  # final webhook. Same image as the API + worker; only the entrypoint
  # differs.
  bbox-worker:
    build: *service-build
    image: flydesk-idp:latest
    container_name: flydesk-idp-bbox-worker
    command: ["bbox-worker"]
    env_file:
      - path: .env
        required: false
    environment:
      FLYDESK_IDP_DATABASE_URL: postgresql+asyncpg://idp:idp@postgres:5432/flydesk_idp
      FLYDESK_IDP_REDIS_URL: redis://redis:6379/0
      FLYDESK_IDP_EDA_ADAPTER: postgres
      # Subscribe to the bbox-refine topic under a dedicated consumer
      # group so the offset advances independently of the main worker.
      # Without these the bus would default to ``flydesk.idp.jobs`` and
      # the bbox-refine events would never reach this container.
      FLYDESK_IDP_EDA_DESTINATIONS: flydesk.idp.bbox.refine
      FLYDESK_IDP_EDA_GROUP: flydesk-idp-bbox-workers
      FLYDESK_IDP_MODEL: ${FLYDESK_IDP_MODEL:-anthropic:claude-sonnet-4-6}
      FLYDESK_IDP_OFFICE_CONVERTER: ${FLYDESK_IDP_OFFICE_CONVERTER:-gotenberg}
      FLYDESK_IDP_GOTENBERG_URL: http://gotenberg:3000
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      RUN_MIGRATIONS: "false"
    depends_on:
      api:
        condition: service_healthy
      gotenberg:
        condition: service_healthy

volumes:
  postgres_data:
