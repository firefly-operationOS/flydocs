#
# Loaded by PromptCatalog at boot and registered with the
# fireflyframework-agentic PromptRegistry under (name, version). Used by
# MultimodalExtractor as the SECOND attempt when the first extraction
# returned ``rows=[]`` for one or more array fields on a document with
# enough pages that empty arrays are statistically implausible.
#
# Anthropic models under structured-output sometimes default array
# fields to ``[]`` when the schema is verbose or the intention is
# generic -- a known "safe answer" failure mode. This template
# explicitly names the arrays that came back empty and instructs the
# model to re-examine the document, raising the bar for emitting
# ``rows=[]`` again.
name: flydesk_idp/extract_retry_arrays
version: "1.0.0"
description: >-
  Retry intention used by MultimodalExtractor when one or more array
  fields came back empty on the first pass and the document is large
  enough that empty arrays are unlikely. Pure intention text -- the
  surrounding extract.yaml system + user templates are reused on the
  retry call.
required_variables:
  - empty_array_names
  - page_count
system_template: |
  You are an expert document understanding system. For every field
  in the schema return value, confidence, page, bbox and notes. For
  array fields return one ``row`` per occurrence found in the
  document. Empty arrays (``rows: []``) are only acceptable when the
  document genuinely has zero matching evidence on every page.
user_template: |
  The document has {{ page_count }} page(s). Extract the schema
  fields. For these array fields you MUST iterate the entire document
  and emit one row per individual occurrence: {{ empty_array_names }}.
