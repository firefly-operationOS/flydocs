# Copyright 2026 Firefly Software Solutions Inc
#
# PR gate -- runs on every pull request and on workflow_dispatch.
# Checks:
#   1. lint        : ruff (check + format)
#   2. typecheck   : pyright (best-effort, doesn't fail the build yet)
#   3. unit        : pytest tests/unit
#   4. docker-build: single-arch Docker build smoke (no push). Multi-arch
#                    push lives in docker-publish.yaml.
#
# The Dockerfile uses BuildKit named contexts for the sibling pyfly +
# fireflyframework-agentic checkouts. The matrix below clones those
# repos into ./vendor/ and points buildx at them via --build-context.

name: PR gate

on:
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"
      - "docs/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pr-gate-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
  # Pin pyfly + agentic to a matching git ref. When the framework
  # repos publish releases we'll switch to ``pip install ...`` here.
  PYFLY_REF: main
  AGENTIC_REF: main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Check out sibling firefly framework repos
        run: |
          git clone --depth=1 --branch "$PYFLY_REF" \
            https://github.com/fireflyframework/fireflyframework-pyfly.git \
            ./vendor/pyfly
          git clone --depth=1 --branch "$AGENTIC_REF" \
            https://github.com/fireflyframework/fireflyframework-agentic.git \
            ./vendor/fireflyframework-agentic
      - name: Repoint uv path sources at ./vendor
        run: |
          sed -i \
            -e 's|path = "\.\./\.\./fireflyframework/fireflyframework-pyfly"|path = "./vendor/pyfly"|' \
            -e 's|path = "\.\./\.\./fireflyframework/fireflyframework-agentic"|path = "./vendor/fireflyframework-agentic"|' \
            pyproject.toml
      - name: uv sync (dev)
        run: uv sync --extra dev
      - name: ruff check
        run: uv run ruff check .
      - name: ruff format --check
        run: uv run ruff format --check .

  typecheck:
    name: Typecheck (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Check out sibling firefly framework repos
        run: |
          git clone --depth=1 --branch "$PYFLY_REF" \
            https://github.com/fireflyframework/fireflyframework-pyfly.git \
            ./vendor/pyfly
          git clone --depth=1 --branch "$AGENTIC_REF" \
            https://github.com/fireflyframework/fireflyframework-agentic.git \
            ./vendor/fireflyframework-agentic
      - name: Repoint uv path sources at ./vendor
        run: |
          sed -i \
            -e 's|path = "\.\./\.\./fireflyframework/fireflyframework-pyfly"|path = "./vendor/pyfly"|' \
            -e 's|path = "\.\./\.\./fireflyframework/fireflyframework-agentic"|path = "./vendor/fireflyframework-agentic"|' \
            pyproject.toml
      - name: uv sync (dev)
        run: uv sync --extra dev
      - name: pyright
        run: uv run pyright src/flydocs

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Check out sibling firefly framework repos
        run: |
          git clone --depth=1 --branch "$PYFLY_REF" \
            https://github.com/fireflyframework/fireflyframework-pyfly.git \
            ./vendor/pyfly
          git clone --depth=1 --branch "$AGENTIC_REF" \
            https://github.com/fireflyframework/fireflyframework-agentic.git \
            ./vendor/fireflyframework-agentic
      - name: Repoint uv path sources at ./vendor
        run: |
          sed -i \
            -e 's|path = "\.\./\.\./fireflyframework/fireflyframework-pyfly"|path = "./vendor/pyfly"|' \
            -e 's|path = "\.\./\.\./fireflyframework/fireflyframework-agentic"|path = "./vendor/fireflyframework-agentic"|' \
            pyproject.toml
      - name: uv sync (dev)
        run: uv sync --extra dev
      - name: pytest tests/unit
        env:
          # Tests use in-memory SQLite and the in-memory EDA bus so no
          # secrets are required. ANTHROPIC_API_KEY is set to a dummy
          # string only so pydantic-ai providers can instantiate.
          ANTHROPIC_API_KEY: sk-dummy-key
          AWS_DEFAULT_REGION: eu-west-1
        run: uv run pytest -q tests/unit

  docling-tests:
    # Layout-aware bbox-refiner + text-anchor adapters are gated behind
    # an optional ``docling`` extra (PyTorch + HF models, ~2.5 GB on
    # disk). The slim ``unit`` lane above does NOT install it -- it
    # exercises the mocked-docling tests. This lane installs the extra
    # for real and runs ``tests/integration/test_docling_real.py``,
    # which loads the Heron layout model and the RapidOCR backend
    # against reportlab-synthesized PDFs. Marked ``continue-on-error``
    # for the first weeks so a flaky model download doesn't block
    # merges; flip to required once the lane has run green for a
    # sustained window.
    name: Docling integration (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081 # v5
        with:
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Check out sibling firefly framework repos
        run: |
          git clone --depth=1 --branch "$PYFLY_REF" \
            https://github.com/fireflyframework/fireflyframework-pyfly.git \
            ./vendor/pyfly
          git clone --depth=1 --branch "$AGENTIC_REF" \
            https://github.com/fireflyframework/fireflyframework-agentic.git \
            ./vendor/fireflyframework-agentic
      - name: Repoint uv path sources at ./vendor
        run: |
          sed -i \
            -e 's|path = "\.\./\.\./fireflyframework/fireflyframework-pyfly"|path = "./vendor/pyfly"|' \
            -e 's|path = "\.\./\.\./fireflyframework/fireflyframework-agentic"|path = "./vendor/fireflyframework-agentic"|' \
            pyproject.toml
      - name: Cache Docling / RapidOCR model weights
        # The first run downloads ~50 MB of weights from modelscope +
        # hugging-face; cache them so subsequent runs are seconds.
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/docling
            ~/.cache/huggingface
            ~/.cache/rapidocr
          key: docling-models-${{ runner.os }}-v1
      - name: uv sync (dev + docling)
        run: uv sync --extra dev --extra docling
      - name: pytest tests/integration/test_docling_real.py
        env:
          ANTHROPIC_API_KEY: sk-dummy-key
          AWS_DEFAULT_REGION: eu-west-1
        run: uv run pytest -q tests/integration/test_docling_real.py

  docker-build:
    name: Docker build smoke (single-arch)
    runs-on: ubuntu-latest
    needs: [lint, unit]
    strategy:
      fail-fast: false
      matrix:
        # Build both image variants on every PR so a Dockerfile change
        # cannot break the docling lane silently. The default image
        # stays the canonical artifact; ``docling`` is the heavy
        # opt-in variant used by deployments that want layout-aware
        # OCR / text-anchor without a runtime pip install.
        include:
          - variant: slim
            advisory: false
          - variant: docling
            # Docling pulls PyTorch + HF model loaders (~2.5 GB
            # cumulative wheel size). Free GHA runners (~14 GB free
            # disk after the default tool image) sit close to the
            # edge; mark this variant advisory until we add a paid
            # larger-disk runner so a transient disk-space exhaustion
            # doesn't block merges. The image is still smoke-built --
            # we just don't fail the gate on it.
            advisory: true
    continue-on-error: ${{ matrix.advisory }}
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space (advisory variants)
        # PyTorch + HF wheels need ~6 GB of free disk space during
        # ``uv sync``. The default GHA runner image fills disk with
        # Android SDK + .NET + Haskell + dotnet -- 25+ GB of tools we
        # never touch. Reclaim it on the docling lane only so the slim
        # lane stays fast.
        if: matrix.variant == 'docling'
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: false
      - name: Check out sibling firefly framework repos
        run: |
          git clone --depth=1 --branch "$PYFLY_REF" \
            https://github.com/fireflyframework/fireflyframework-pyfly.git \
            ./vendor/pyfly
          git clone --depth=1 --branch "$AGENTIC_REF" \
            https://github.com/fireflyframework/fireflyframework-agentic.git \
            ./vendor/fireflyframework-agentic
      - uses: docker/setup-buildx-action@v3
      - name: docker buildx build (linux/amd64, load)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: flydocs:pr-${{ github.event.pull_request.number }}-${{ matrix.variant }}
          platforms: linux/amd64
          build-args: |
            WITH_DOCLING=${{ matrix.variant == 'docling' && 'true' || 'false' }}
          build-contexts: |
            pyfly=./vendor/pyfly
            fireflyframework-agentic=./vendor/fireflyframework-agentic
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}
