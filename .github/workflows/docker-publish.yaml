# Copyright 2026 Firefly Software Solutions Inc
#
# Multi-arch image build + GHCR push.
#
#   * Triggers
#       - push to main             → tags ``main``, ``sha-<short>``, ``latest``
#       - push of a SemVer tag     → tags ``vX.Y.Z``, ``vX.Y``, ``vX``, ``latest``
#       - workflow_dispatch        → tags ``manual-<short>``
#
#   * Platforms : linux/amd64, linux/arm64
#   * Registry  : ghcr.io/<owner>/<repo>
#                 (the owner is normalised to lower-case below, since
#                 GHCR rejects upper-case namespaces -- ``firefly-operationOS``
#                 → ``firefly-operationos``).
#
# The Dockerfile uses BuildKit named contexts for the pyfly +
# fireflyframework-agentic sibling repos. We clone them into ./vendor/
# and pass them via ``build-contexts:`` so the same Dockerfile works
# both locally (siblings on disk) and in CI.

name: Docker publish (multi-arch)

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      tag_suffix:
        description: "Optional extra tag (will be sanitised)."
        required: false
        default: ""

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  PYFLY_REF: main
  AGENTIC_REF: main

jobs:
  publish:
    name: Build + push (${{ matrix.platforms_label }}) -- ${{ matrix.variant }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Canonical slim image -- the one most consumers want. Built
          # for both architectures so arm64 hosts (Apple Silicon, AWS
          # Graviton, ...) pull the right manifest transparently.
          - variant: slim
            with_docling: "false"
            tag_prefix: ""
            platforms: "linux/amd64,linux/arm64"
            platforms_label: "amd64+arm64"
          # Heavy variant with the layout-aware Docling OCR + Markdown
          # text-anchor baked in. Pulls PyTorch + HF models (~2.5 GB
          # per architecture). Multi-arch BuildKit + QEMU exceeds the
          # default GHA runner's disk; we publish amd64 only here and
          # let arm64 consumers build locally with WITH_DOCLING=true.
          # When we migrate to larger paid runners we can flip this
          # back to both architectures.
          - variant: docling
            with_docling: "true"
            tag_prefix: "docling-"
            platforms: "linux/amd64"
            platforms_label: "amd64"
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space (docling variant only)
        # Docling adds PyTorch + HF wheels (~2.5 GB per architecture)
        # to the image, plus BuildKit keeps intermediate layers in
        # /var/lib/docker. The default GHA runner image fills disk
        # with Android SDK / .NET / Haskell / dotnet caches (25+ GB)
        # we never use. Reclaim those before the docling build so the
        # multi-stage BuildKit copy step does not run out of space.
        if: matrix.with_docling == 'true'
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: false

      - name: Normalise GHCR namespace to lower-case
        id: ns
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          name="${GITHUB_REPOSITORY##*/}"
          echo "image=${{ env.REGISTRY }}/${owner}/${name}" >> "$GITHUB_OUTPUT"

      - name: Check out sibling firefly framework repos
        run: |
          git clone --depth=1 --branch "$PYFLY_REF" \
            https://github.com/fireflyframework/fireflyframework-pyfly.git \
            ./vendor/pyfly
          git clone --depth=1 --branch "$AGENTIC_REF" \
            https://github.com/fireflyframework/fireflyframework-agentic.git \
            ./vendor/fireflyframework-agentic

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ matrix.platforms }}

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.ns.outputs.image }}
          # Slim variant uses unprefixed tags (``latest``, ``main``,
          # ``v1.2.3``). The docling variant pins everything under a
          # ``docling-`` prefix so the two never collide -- pulling
          # ``:latest`` always lands on slim; pulling
          # ``:docling-latest`` lands on the heavy variant.
          flavor: |
            latest=${{ matrix.with_docling == 'false' && format('auto') || format('false') }}
            prefix=${{ matrix.tag_prefix }},onlatest=true
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=short,prefix=${{ matrix.tag_prefix }}sha-
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=${{ matrix.tag_prefix }}latest,enable=${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
            type=raw,value=${{ matrix.tag_prefix }}manual-${{ github.run_id }},enable=${{ github.event_name == 'workflow_dispatch' }}
          labels: |
            org.opencontainers.image.title=flydocs${{ matrix.with_docling == 'true' && ' (docling)' || '' }}
            org.opencontainers.image.description=Firefly Desk -- Intelligent Document Processing service. Pure multimodal extraction with bbox.${{ matrix.with_docling == 'true' && ' Layout-aware OCR + Markdown text-anchor baked in.' || '' }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=Apache-2.0
            org.opencontainers.image.vendor=Firefly Software Solutions Inc
            io.flydocs.variant=${{ matrix.variant }}

      - name: Build + push (${{ matrix.platforms_label }}) -- ${{ matrix.variant }}
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platforms }}
          push: true
          provenance: true
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            WITH_DOCLING=${{ matrix.with_docling }}
          build-contexts: |
            pyfly=./vendor/pyfly
            fireflyframework-agentic=./vendor/fireflyframework-agentic
          cache-from: type=gha,scope=${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.variant }}

      # ``actions/attest-build-provenance`` requires Build & Validate
      # Attestations to be enabled on the GitHub organisation (paid /
      # Enterprise feature, or public repo). The image is already
      # signed via buildkit's ``provenance: true`` flag above; this
      # extra attestation is a belt-and-braces upload that is not
      # mandatory. Make it advisory so a free-tier org doesn't fail
      # the whole publish workflow.
      - name: Attest build provenance (advisory)
        uses: actions/attest-build-provenance@v2
        continue-on-error: true
        with:
          subject-name: ${{ steps.ns.outputs.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Summary
        run: |
          {
            echo "### Published image -- ${{ matrix.variant }}"
            echo
            echo "**Image**: \`${{ steps.ns.outputs.image }}\`"
            echo "**Variant**: \`${{ matrix.variant }}\` (WITH_DOCLING=${{ matrix.with_docling }})"
            echo "**Digest**: \`${{ steps.build.outputs.digest }}\`"
            echo
            echo "**Tags:**"
            echo '```'
            echo "${{ steps.meta.outputs.tags }}"
            echo '```'
            echo
            echo "Pull on either architecture:"
            echo '```bash'
            echo "docker pull ${{ steps.ns.outputs.image }}:${{ matrix.tag_prefix }}latest      # arm64 + amd64 manifest"
            echo "docker pull --platform linux/arm64 ${{ steps.ns.outputs.image }}:${{ matrix.tag_prefix }}latest"
            echo "docker pull --platform linux/amd64 ${{ steps.ns.outputs.image }}:${{ matrix.tag_prefix }}latest"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
