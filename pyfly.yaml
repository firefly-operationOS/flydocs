#
# PyFly application configuration. Values override the property-driven defaults
# activated by ``enable_core_stack``. Anything in the environment (FLYDOCS_*)
# wins over this file because pydantic-settings is loaded after pyfly merges its
# config sources.

pyfly:
  # Web tier -- FastAPI adapter, default ASGI server, /api as base.
  web:
    enabled: true
    base-path: /api
  server:
    enabled: true
    host: 0.0.0.0
    port: 8400

  # Observability -- Prometheus metrics + OpenTelemetry tracing.
  observability:
    enabled: true
  metrics:
    enabled: true
  tracing:
    enabled: true
    service-name: flydocs

  # Actuator -- /actuator/health, /actuator/info, /actuator/metrics
  actuator:
    enabled: true
    metrics:
      enabled: true

  # Admin dashboard -- embedded management UI at /admin/. Wires up the
  # standard pyfly providers (beans, health, env, config, loggers, metrics,
  # scheduled tasks, mappings, caches, cqrs, transactions, traces, runtime,
  # server, overview). Read-only by default; toggle ``require-auth: true``
  # before exposing it to the public internet.
  admin:
    enabled: true
    path: /admin
    title: "flydocs -- PyFly Admin"
    theme: auto
    require-auth: false
    refresh-interval: 5000

  # AOP -- required for @authorize / @cacheable / @retry decorators.
  aop:
    enabled: true

  # Resilience -- circuit breaker + retry for outbound LLM and webhook calls.
  resilience:
    enabled: true

  # CQRS -- CommandBus + QueryBus + handler scan.
  cqrs:
    enabled: true

  # Cache -- Redis-backed (falls back to in-memory if Redis URL is unset).
  cache:
    enabled: true

  # EDA -- async-jobs event bus, wired by pyfly's EdaAutoConfiguration.
  # Default provider is ``postgres`` which uses LISTEN/NOTIFY + the
  # durable ``pyfly_eda_outbox`` table; flydocs already runs Postgres
  # so no extra broker is required. Override with
  # ``FLYDOCS_EDA_ADAPTER`` (memory | postgres | redis | kafka).
  eda:
    enabled: true
    provider: ${FLYDOCS_EDA_ADAPTER:postgres}
    # Both knobs are env-overridable so the ``bbox-worker`` container can
    # subscribe to ``flydocs.bbox.refine`` under its own consumer
    # group while the main ``worker`` keeps consuming ``flydocs.jobs``.
    destinations: ${FLYDOCS_EDA_DESTINATIONS:flydocs.jobs}
    group: ${FLYDOCS_EDA_GROUP:flydocs-workers}
    postgres:
      dsn: ${FLYDOCS_DATABASE_URL:postgresql+asyncpg://idp:idp@localhost:5432/flydocs}
      channel: flydocs_eda
    redis:
      url: ${FLYDOCS_REDIS_URL:redis://localhost:6379/0}
    kafka:
      bootstrap-servers: ${FLYDOCS_KAFKA_BOOTSTRAP:localhost:9092}

  # Persistence -- async SQLAlchemy with Alembic migrations on startup if
  # ``RUN_MIGRATIONS=true``.
  data:
    relational:
      enabled: true
      url: ${FLYDOCS_DATABASE_URL:postgresql+asyncpg://idp:idp@localhost:5432/flydocs}
